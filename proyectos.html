  <script>
    const mainImg = document.getElementById('main-artwork');
    const titleEl = document.getElementById('artwork-title');
    const metaEl  = document.getElementById('artwork-meta');
    const descEl  = document.getElementById('artwork-desc');

    document.querySelectorAll('.year-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = btn.closest('.year-item');
        const isOpen = item.classList.contains('open');
        document.querySelectorAll('.year-item.open').forEach(el => el.classList.remove('open'));
        if (!isOpen) item.classList.add('open');
      });
    });

    document.querySelectorAll('.year-dropdown a').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        mainImg.src         = link.dataset.src;
        titleEl.textContent = link.dataset.title;
        metaEl.textContent  = link.dataset.meta;
        descEl.textContent  = link.dataset.desc || '';
        document.querySelectorAll('.year-dropdown a.sub-active')
          .forEach(el => el.classList.remove('sub-active'));
        link.classList.add('sub-active');
      });
    });
  </script>
